
services:
  nginx:
    image: nginx:latest
    container_name: nginx-nexsim
    ports:
      - "8090:80"
    volumes:
      - ./src:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php

  php:
    image: php:8.2-fpm
    container_name: php-nexsim
    volumes:
      - ./src:/var/www/html